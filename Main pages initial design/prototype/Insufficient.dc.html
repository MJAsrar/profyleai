<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:#f6f3ec;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#211f1c;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
input{font-family:inherit}
::selection{background:#2e6a4a;color:#f6f3ec}
summary{list-style:none;cursor:pointer}
summary::-webkit-details-marker{display:none}
.fq-minus{display:none}
details[open] .fq-plus{display:none}
details[open] .fq-minus{display:inline-flex}
</style>
</helmet>
<div style="min-height:100vh;background:#f6f3ec">
<div style="width:720px;height:100vh;overflow:hidden;position:relative;background:#dfe4dc;margin:0 auto">
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(180deg,#e7ece4 0 46px,#e2e7df 46px 92px);opacity:.6"></div>
        <div style="position:absolute;inset:0;background:rgba(18,26,20,.55)"></div>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:420px;background:#f6f3ec;border-radius:20px;padding:34px 32px;text-align:center;box-shadow:0 40px 100px -30px rgba(0,0,0,.6)">
          <div style="width:60px;height:60px;border-radius:999px;background:#fff3e6;color:#a1633c;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px">◇</div>
          <div style="font-family:'Newsreader',serif;font-size:24px;color:#211f1c;margin-bottom:10px">You need 2 more credits</div>
          <p style="font-size:14.5px;line-height:1.55;color:#5c564d;margin:0 0 20px">Interview prep costs <strong style="color:#211f1c;font-weight:600">5 credits</strong> and you have <strong style="color:#211f1c;font-weight:600">3</strong>. Top up to keep going — your work is saved.</p>
          <div style="background:#eef2ea;border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:22px"><span style="font-size:13px;color:#5c564d">Balance</span><span style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#211f1c;font-weight:700">3 / 5 needed</span></div>
          <a href="BuyCredits.dc.html" style="display:block;background:#2e6a4a;color:#f4efe6;font-weight:700;font-size:15px;padding:14px;border-radius:11px;margin-bottom:10px" style-hover="background:#26583d">Buy credits</a>
          <button style="background:none;border:0;color:#8a837a;font-size:14px;font-family:'Hanken Grotesk',sans-serif;cursor:pointer">Maybe later</button>
        </div>
      </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { authMode: 'signup', showPw: false, pw: '', agree: false, bannerOpen: true };

  showSignup = () => this.setState({ authMode: 'signup' });
  showLogin = () => this.setState({ authMode: 'login' });
  togglePw = () => this.setState(s => ({ showPw: !s.showPw }));
  onPw = (e) => this.setState({ pw: e.target.value });
  toggleAgree = () => this.setState(s => ({ agree: !s.agree }));
  dismissBanner = () => this.setState({ bannerOpen: false });

  strengthScore() {
    const p = this.state.pw || '';
    if (!p.length) return 0;
    let s = 0;
    if (p.length >= 8) s++;
    if (/[a-z]/.test(p) && /[A-Z]/.test(p)) s++;
    if (/\d/.test(p)) s++;
    if (/[^A-Za-z0-9]/.test(p)) s++;
    return Math.max(1, s);
  }

  renderVals() {
    const isSignup = this.state.authMode === 'signup';
    const s = this.strengthScore();
    const colors = ['#c9c2b6', '#b4472f', '#b07a2f', '#4a7a3f', '#2e6a4a'];
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    const canSubmit = !isSignup || this.state.agree;
    return {
      bannerOpen: this.state.bannerOpen,
      dismissBanner: this.dismissBanner,
      isSignup,
      isLogin: !isSignup,
      showSignup: this.showSignup,
      showLogin: this.showLogin,
      pwType: this.state.showPw ? 'text' : 'password',
      pwToggleLabel: this.state.showPw ? 'Hide' : 'Show',
      togglePw: this.togglePw,
      onPw: this.onPw,
      strengthLabel: labels[s],
      strengthBarStyle: {
        height: '100%',
        width: (s / 4 * 100) + '%',
        background: colors[s],
        borderRadius: '999px',
        transition: 'width .25s ease'
      },
      agree: this.state.agree,
      toggleAgree: this.toggleAgree,
      submitStyle: {
        width: '100%',
        background: '#2e6a4a',
        color: '#f4efe6',
        border: '0',
        borderRadius: '11px',
        padding: '15px',
        fontFamily: "'Hanken Grotesk', sans-serif",
        fontSize: '16px',
        fontWeight: '700',
        opacity: canSubmit ? 1 : 0.45,
        cursor: canSubmit ? 'pointer' : 'not-allowed'
      },
      submitLabel: isSignup ? 'Create account — get 10 free credits' : 'Log in',
      onSubmit: (e) => { if (e && e.preventDefault) e.preventDefault(); }
    };
  }
}
</script>
</body>
</html>
