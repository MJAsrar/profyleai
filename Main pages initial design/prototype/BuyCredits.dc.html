</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { authMode: 'signup', showPw: false, pw: '', agree: false, bannerOpen: true };

  showSignup = () => this.setState({ authMode: 'signup' });
  showLogin = () => this.setState({ authMode: 'login' });
  togglePw = () => this.setState(s => ({ showPw: !s.showPw }));
  onPw = (e) => this.setState({ pw: e.target.value });
  toggleAgree = () => this.setState(s => ({ agree: !s.agree }));
  dismissBanner = () => this.setState({ bannerOpen: false });

  strengthScore() {
    const p = this.state.pw || '';
    if (!p.length) return 0;
    let s = 0;
    if (p.length >= 8) s++;
    if (/[a-z]/.test(p) && /[A-Z]/.test(p)) s++;
    if (/\d/.test(p)) s++;
    if (/[^A-Za-z0-9]/.test(p)) s++;
    return Math.max(1, s);
  }

  renderVals() {
    const isSignup = this.state.authMode === 'signup';
    const s = this.strengthScore();
    const colors = ['#c9c2b6', '#b4472f', '#b07a2f', '#4a7a3f', '#2e6a4a'];
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    const canSubmit = !isSignup || this.state.agree;
    return {
      bannerOpen: this.state.bannerOpen,
      dismissBanner: this.dismissBanner,
      isSignup,
      isLogin: !isSignup,
      showSignup: this.showSignup,
      showLogin: this.showLogin,
      pwType: this.state.showPw ? 'text' : 'password',
      pwToggleLabel: this.state.showPw ? 'Hide' : 'Show',
      togglePw: this.togglePw,
      onPw: this.onPw,
      strengthLabel: labels[s],
      strengthBarStyle: {
        height: '100%',
        width: (s / 4 * 100) + '%',
        background: colors[s],
        borderRadius: '999px',
        transition: 'width .25s ease'
      },
      agree: this.state.agree,
      toggleAgree: this.toggleAgree,
      submitStyle: {
        width: '100%',
        background: '#2e6a4a',
        color: '#f4efe6',
        border: '0',
        borderRadius: '11px',
        padding: '15px',
        fontFamily: "'Hanken Grotesk', sans-serif",
        fontSize: '16px',
        fontWeight: '700',
        opacity: canSubmit ? 1 : 0.45,
        cursor: canSubmit ? 'pointer' : 'not-allowed'
      },
      submitLabel: isSignup ? 'Create account — get 10 free credits' : 'Log in',
      onSubmit: (e) => { if (e && e.preventDefault) e.preventDefault(); }
    };
  }
}
</script>
